name: "\U0001F41B Bug Report"
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below so we can reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Set `UPSTREAM_BASE_URL=...`
        2. Run `uv run python -m claude_code_proxy`
        3. Send a request with `tool_use` …
        4. See error …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `python -c \"import claude_code_proxy; print(claude_code_proxy.__version__)\"` or commit SHA"
      placeholder: "0.1.0 / abc1234"
    validations:
      required: false

  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      options:
        - "3.11"
        - "3.12"
        - "3.13"
        - "Other"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant terminal output (Rich panels, tracebacks, etc.)
      render: shell
    validations:
      required: false
